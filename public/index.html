<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banco Imobiliário</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen active" id="screenName">
    <h1>🏠 Banco Imobiliário</h1>
    <input id="nameInput" placeholder="Digite seu nome">
    <button onclick="goToLobby()">Continuar</button>
</div>

<div class="screen" id="screenLobby">
    <h2>Bem-vindo, <span id="playerName"></span></h2>

    <button onclick="createRoom()">Criar Sala</button>

    <input id="roomIdInput" placeholder="Código da sala">
    <button onclick="joinRoom()">Entrar</button>
</div>

<div class="screen" id="screenGame">
    <h2>Sala: <span id="roomCode"></span></h2>

    <ul id="players"></ul>

    <button id="startBtn" onclick="startGame()">Iniciar</button>

    <p id="turn">Aguardando...</p>

    <button id="rollBtn" onclick="rollDice()">🎲 Rolar</button>

    <p id="dice"></p>

    <h3>Tabuleiro</h3>
    <div id="board"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
