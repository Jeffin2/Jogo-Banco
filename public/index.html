<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banco Imobiliário</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="screenName" class="screen active">
    <h1>🏠 Banco Imobiliário</h1>
    <input id="nameInput" placeholder="Seu nome">
    <button onclick="goLobby()">Entrar</button>
</div>

<div id="screenLobby" class="screen">
    <button onclick="createRoom()">Criar Sala</button>
    <input id="roomIdInput" placeholder="Código">
    <button onclick="joinRoom()">Entrar</button>
</div>

<div id="screenRoom" class="screen">
    <h2>Sala: <span id="roomCode"></span></h2>
    <p id="status"></p>
    <ul id="players"></ul>
    <button id="startBtn" onclick="startGame()">Iniciar</button>
</div>

<div id="screenGame" class="screen">
    <h2 id="turn"></h2>
    <button onclick="rollDice()">🎲</button>
    <div id="board"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
